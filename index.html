<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音でお知らせ！持ち物タイマー</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #fff5f5; }
        h1 { color: #d9534f; }
        .timer-setting { font-size: 20px; margin-bottom: 20px; }
        input[type="number"] { font-size: 24px; width: 60px; text-align: center; border: 2px solid #d9534f; border-radius: 8px; }
        button { font-size: 22px; padding: 15px 40px; background: #d9534f; color: white; border: none; border-radius: 50px; box-shadow: 0 4px #a94442; cursor: pointer; }
        button:active { box-shadow: none; transform: translateY(4px); }
        .list { margin-top: 30px; text-align: left; display: inline-block; background: white; padding: 25px; border-radius: 15px; border: 2px solid #eee; }
        .item { font-size: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>出発タイマー</h1>
    
    <div class="timer-setting">
        あと <input type="number" id="minutes" value="1"> 分で出発
    </div>
    
    <button onclick="startTimer()">タイマー開始</button>

    <br>
    <div class="list">
        <strong>【チェックリスト】</strong><hr>
        <div class="item"><input type="checkbox"> 鍵（玄関）</div>
        <div class="item"><input type="checkbox"> 財布・定期</div>
        <div class="item"><input type="checkbox"> スマホ</div>
        <div class="item"><input type="checkbox"> 学生証 / 社員証</div>
    </div>

    <script>
        // 音を鳴らすための関数（電子音を生成）
        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'expo'; // 音の種類
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // ドレミの「ラ」の音
            
            oscillator.start();
            // 1秒かけて音を小さくして止める
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
            oscillator.stop(audioCtx.currentTime + 1);
        }

        function startTimer() {
            const min = document.getElementById('minutes').value;
            const ms = min * 60 * 1000;
            
            // 最初に一度音を鳴らして、ブラウザに「音を出す許可」を確定させる（重要）
            playBeep();
            alert(min + "分後にアラートを鳴らします。\n※ブラウザを閉じずに待機してください。");

            setTimeout(() => {
                // 時間になったら3回音を鳴らす
                playBeep();
				playBeep();
				playBeep();
                //setTimeout(playBeep, 500);
                //setTimeout(playBeep, 1000);
                
                // アラートを表示
                alert("時間です！持ち物を確認して出発しましょう！");
            }, ms);
        }
    </script>
</body>
</html>
